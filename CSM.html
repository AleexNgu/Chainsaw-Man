<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Chainsaw Man Fan Page</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(black,#3a0000);
    color:white;
    text-align:center;
}

header{
    padding:40px;
    background:black;
    border-bottom:3px solid red;
}

h1{
    font-size:50px;
    color:#ff3131;
    text-shadow:0 0 10px red;
}

nav a{
    color:white;
    margin:15px;
    text-decoration:none;
    font-size:18px;
}

nav a:hover{
    color:red;
}

.hero{
    padding:60px;
}

button{
    background:red;
    border:none;
    padding:12px 25px;
    font-size:16px;
    color:white;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    background:#ff3c3c;
}

.characters{
    display:flex;
    justify-content:center;
    gap:30px;
    margin:40px;
}

.card{
    background:#111;
    padding:20px;
    border-radius:10px;
    width:200px;
    transition:0.3s;
    box-shadow:0 0 10px red;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
}

footer{
    margin-top:40px;
    padding:20px;
    background:black;
}

</style>
</head>

<body>

<header>
<h1>CHAINSAW MAN</h1>

<nav>
<a href="#">Home</a>
<a href="#">Characters</a>
<a href="#">Story</a>
</nav>
</header>


<section class="hero">
<h2>Welcome Devil Hunter</h2>
<p>Un mic site inspirat din anime-ul Chainsaw Man.</p>

<button onclick="alert('Bang.')">Apasă dacă ai curaj</button>
</section>


<section class="characters">

<div class="card">
<h3>Denji</h3>
<p>Un băiat sărac care devine Chainsaw Man.</p>
</div>

<div class="card">
<h3>Power</h3>
<p>Blood devil cu personalitate haotică.</p>
</div>

<div class="card">
<h3>Makima</h3>
<p>Un personaj misterios și foarte puternic.</p>
</div>

</section>


<footer>
<p>Chainsaw Man Fan Page</p>
</footer>

</body>
</html>
